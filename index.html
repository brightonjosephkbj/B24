<!DOCTYPE html>

<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <title>KBJ Music Ultra</title>

    <style>

        :root { --main: #1db954; --bg: #000; --card: #121212; --text: #fff; --gray: #b3b3b3; }

        .light-theme { --main: #007bff; --bg: #f8f9fa; --card: #ffffff; --text: #000; --gray: #666; }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; margin: 0; padding: 0; overflow: hidden; height: 100vh; transition: 0.3s; }

        /* Splash Screen */

        #splash { position: fixed; inset: 0; background: #000; z-index: 10000; display: flex; flex-direction: column; align-items: center; justify-content: center; }

        .splash-logo { width: 140px; border-radius: 50%; border: 3px solid var(--main); animation: liquid 5s ease-in-out forwards; }

        @keyframes liquid { 0% { transform: scale(0.6); opacity: 0; } 20% { transform: scale(1); opacity: 1; } 80% { transform: scale(1); opacity: 1; } 100% { transform: scale(1.5); opacity: 0; } }

        /* Layout */

        .header { height: 60px; background: var(--card); display: flex; justify-content: space-between; align-items: center; padding: 0 20px; border-bottom: 1px solid #282828; }

        .nav-bar { height: 70px; background: var(--card); display: flex; justify-content: space-around; align-items: center; position: fixed; bottom: 0; width: 100%; border-top: 1px solid #282828; }

        .nav-item { color: var(--gray); text-align: center; font-size: 0.7rem; flex: 1; cursor: pointer; }

        .nav-item.active { color: var(--main); }

        .screen { display: none; height: calc(100vh - 130px); overflow-y: auto; padding: 20px; }

        .active-screen { display: block; }

        /* UI Elements */

        .card { background: var(--card); padding: 15px; border-radius: 10px; margin-bottom: 12px; display: flex; align-items: center; justify-content: space-between; }

        .btn { background: var(--main); color: #000; border: none; padding: 8px 15px; border-radius: 8px; font-weight: bold; cursor: pointer; }

        input, select { background: #282828; border: none; padding: 10px; border-radius: 8px; color: #fff; outline: none; }

        /* Player */

        .player-ui { text-align: center; }

        #cover { width: 250px; height: 250px; border-radius: 15px; object-fit: cover; margin-bottom: 20px; }

        #lyrics { height: 80px; font-size: 1.1rem; font-weight: bold; color: var(--main); display: flex; align-items: center; justify-content: center; text-align: center; }

        .slider { width: 100%; accent-color: var(--main); margin: 20px 0; }

        .play-btn { width: 70px; height: 70px; background: var(--main); border-radius: 50%; font-size: 1.8rem; border: none; cursor: pointer; }

    </style>

</head>

<body>

    <div id="splash"><img src="logo.jpeg" class="splash-logo"></div>

    <div class="header">

        <span style="font-weight:900; color:var(--main)">KBJ MUSIC</span>

        <div onclick="openTab('settings')" style="cursor:pointer; font-size:1.5rem;">⋮</div>

    </div>

    <div id="home" class="screen active-screen">

        <h2>Library</h2>

        <div class="card" onclick="playSong('song.mp3', 'Who\'s That Girl', 'Ayra Starr', 'logo.jpeg')">

            <span>🎵 <strong>Who's That Girl</strong></span>

            <small>Ayra Starr</small>

        </div>

    </div>

    <div id="search" class="screen">

        <div style="display:flex; gap:10px; margin-bottom:20px;">

            <input type="text" id="query" style="flex:1" placeholder="Search songs...">

            <button class="btn" onclick="runSearch()">Go</button>

        </div>

        <div id="results"></div>

    </div>

    <div id="player" class="screen">

        <div class="player-ui">

            <img id="cover" src="logo.jpeg">

            <h2 id="t-name">KBJ Player</h2>

            <div id="lyrics">Ready to play</div>

            <input type="range" id="seek" class="slider" value="0">

            <div style="display:flex; justify-content:space-between; font-size:0.7rem; color:var(--gray)">

                <span id="time-cur">0:00</span><span id="time-total">0:00</span>

            </div>

            <audio id="audio"></audio>

            <button class="play-btn" onclick="togglePlay()" id="play-trigger">▶</button>

        </div>

    </div>

    <div id="settings" class="screen">

        <div onclick="openTab('home')" style="color:var(--main); margin-bottom:20px; cursor:pointer;">← Back</div>

        <h2 style="margin-bottom:20px;">Settings</h2>

        

        <div class="card">

            <span>Appearance Theme</span>

            <button class="btn" onclick="document.body.classList.toggle('light-theme')">Switch</button>

        </div>

        <div class="card">

            <span>Language</span>

            <select id="lang-select">

                <option>English</option>

                <option>French</option>

                <option>Spanish</option>

            </select>

        </div>

        <div class="card">

            <div>

                <strong>Account Info</strong><br>

                <small style="color:var(--gray)">User ID: KBJ_772</small>

            </div>

            <span style="color:var(--main)">Premium</span>

        </div>

        <div class="card">

            <div>

                <strong>App Version</strong><br>

                <small style="color:var(--gray)">v1.4.2 (Stable)</small>

            </div>

            <button class="btn" style="font-size: 0.7rem;" onclick="alert('Checking for updates...')">Update</button>

        </div>

        <div class="card" onclick="alert('Link copied to clipboard!')" style="cursor:pointer">

            <span>Share the App</span>

            <span style="font-size:1.2rem">↗️</span>

        </div>

    </div>

    <div class="nav-bar">

        <div class="nav-item active" id="btn-home" onclick="openTab('home')">🏠<br>Home</div>

        <div class="nav-item" id="btn-search" onclick="openTab('search')">🔍<br>Search</div>

        <div class="nav-item" id="btn-player" onclick="openTab('player')">🎵<br>Player</div>

    </div>

    <script>

        const audio = document.getElementById('audio');

        const lyrics = document.getElementById('lyrics');

        const seek = document.getElementById('seek');

        const playBtn = document.getElementById('play-trigger');

        setTimeout(() => { document.getElementById('splash').style.display = 'none'; }, 5000);

        function openTab(tab) {

            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active-screen'));

            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));

            document.getElementById(tab).classList.add('active-screen');

            const btn = document.getElementById('btn-' + tab);

            if(btn) btn.classList.add('active');

        }

        function togglePlay() {

            if(audio.paused) { audio.play(); playBtn.innerText = "⏸"; }

            else { audio.pause(); playBtn.innerText = "▶"; }

        }

        function playSong(src, title, artist, img) {

            audio.src = src;

            document.getElementById('t-name').innerText = title;

            document.getElementById('cover').src = img;

            openTab('player');

            audio.play();

            playBtn.innerText = "⏸";

        }

        async function runSearch() {

            const q = document.getElementById('query').value;

            if(!q) return;

            const res = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(q)}&limit=5`);

            const data = await res.json();

            const results = document.getElementById('results');

            results.innerHTML = "";

            data.results.forEach(s => {

                const item = document.createElement('div');

                item.className = 'card';

                item.innerHTML = `<span>${s.trackName}</span><small>${s.artistName}</small>`;

                item.onclick = () => playSong(s.previewUrl, s.trackName, s.artistName, s.artworkUrl100);

                results.appendChild(item);

            });

        }

        audio.ontimeupdate = () => {

            const cur = audio.currentTime;

            const dur = audio.duration || 0;

            seek.value = (cur / dur) * 100 || 0;

            document.getElementById('time-cur').innerText = formatTime(cur);

            document.getElementById('time-total').innerText = formatTime(dur);

            if(audio.src.includes('song.mp3')) {

                if(cur < 13) lyrics.innerText = "🎶 (Intro)";

                else if(cur < 17) lyrics.innerText = "Walking in the room, lights follow her glow";

            }

        };

        seek.oninput = () => { audio.currentTime = (seek.value / 100) * audio.duration; };

        function formatTime(s) {

            let m = Math.floor(s / 60);

            let sec = Math.floor(s % 60);

            return m + ":" + (sec < 10 ? "0" + sec : sec);

        }

    </script>

</body>

</html>
